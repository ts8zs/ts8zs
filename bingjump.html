<!DOCTYPE html>
<html>
<head>
    <title>手气不错 - 自动跳转首条结果</title>
    <meta charset="UTF-8">
</head>
<body>
    <script>
        // 从 URL 获取搜索参数（例如：?q=要搜索的关键词）
        const urlParams = new URLSearchParams(window.location.search);
        const searchQuery = urlParams.get('q');

        // 配置 Bing API（需自行申请密钥）
        const bingApiKey = 'YOUR_BING_API_KEY'; // 替换为你的API密钥
        const endpoint = 'https://api.bing.microsoft.com/v7.0/search';

        if (searchQuery) {
            fetch(`${endpoint}?q=${encodeURIComponent(searchQuery)}`, {
                headers: {
                    'Ocp-Apim-Subscription-Key': bingApiKey
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.webPages && data.webPages.value.length > 0) {
                    // 获取首条结果并跳转
                    const firstResult = data.webPages.value[0].url;
                    window.location.href = firstResult;
                } else {
                    document.body.innerHTML = '未找到相关结果';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                document.body.innerHTML = '搜索服务暂时不可用';
            });
        } else {
            document.body.innerHTML = '请输入搜索参数（例如：?q=关键词）';
        }
    </script>

<style>
#home-corner-btn{position:fixed;bottom:0;left:0;width:72px;height:72px;z-index:99999;
  background:#2e7d32;clip-path:polygon(0 0,0 100%,100% 100%);
  display:flex;align-items:flex-end;justify-content:flex-start;padding:6px 0 6px 8px;
  box-sizing:border-box;text-decoration:none;}
#home-corner-btn svg{width:28px;height:28px;color:#fff;filter:drop-shadow(0 1px 2px rgba(0,0,0,.35));}
:fullscreen #home-corner-btn,:-webkit-full-screen #home-corner-btn{display:none!important;}
</style>
<a id="home-corner-btn" href="/" title="//go home"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 10.5v9.5a2 2 0 0 0 2 2h5v-7h6v7h5a2 2 0 0 0 2-2v-9.5L12 2z"/></svg></a>
</body>
</html>
