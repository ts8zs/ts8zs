---
layout: default
---
<article class="post">
  <header class="post-header">
    <div class="back"><a href="/">&larrar; 回到首页</a></div>
    <h1>{{ page.title }}</h1>
    {% if page.date %}<div class="post-date">{{ page.date | date: "%Y-%m-%d" }}</div>{% endif %}
  </header>

  {{ content }}
</article>
