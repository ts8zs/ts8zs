<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'zh-CN' }}">

<head>
  <meta charset="UTF-8">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="icon" href="/favicon.svg">
  <style>
    :root {
      --bg: #ffffff;
      --fg: #2c3e50;
      --muted: #8492a6;
      --link: #42b983;
      --link-hover: #2c8c5e;
      --border: #eaecef;
      --code-bg: #f6f8fa;
      --sidebar-bg: #fafbfc;
      --active-bg: rgba(66, 185, 131, 0.12);
      --sidebar-width: 250px;
      --main-max: 820px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1d1f21;
        --fg: #c9d1d9;
        --muted: #8b949e;
        --link: #58d39a;
        --link-hover: #7fe0b0;
        --border: #30363d;
        --code-bg: #2d333b;
        --sidebar-bg: #161718;
        --active-bg: rgba(88, 211, 154, 0.15);
      }
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                   "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.7;
      font-size: 16px;
    }

    a { color: var(--link); text-decoration: none; }
    a:hover { color: var(--link-hover); text-decoration: underline; }

    /* ====== Layout: sidebar + main ====== */
    .layout {
      display: flex;
      align-items: flex-start;
      min-height: 100vh;
    }

    .sidebar {
      flex: 0 0 var(--sidebar-width);
      width: var(--sidebar-width);
      position: sticky;
      top: 0;
      align-self: flex-start;
      height: 100vh;
      overflow-y: auto;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      padding: 20px 16px 60px;
      font-size: 0.93em;
    }

    .sidebar-brand {
      font-weight: 700;
      font-size: 1.15em;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-brand a { color: var(--fg); }

    .sidebar-nav h3 {
      margin: 16px 0 6px;
      font-size: 0.8em;
      color: var(--muted);
      text-transform: none;
      font-weight: 600;
      letter-spacing: 0;
    }
    .sidebar-nav ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .sidebar-nav li { margin: 0; }
    .sidebar-nav a {
      display: block;
      padding: 5px 10px;
      border-radius: 4px;
      color: var(--fg);
      line-height: 1.45;
    }
    .sidebar-nav a:hover {
      background: var(--active-bg);
      color: var(--link);
      text-decoration: none;
    }
    .sidebar-nav a.active {
      background: var(--active-bg);
      color: var(--link);
      font-weight: 600;
    }

    .main {
      flex: 1 1 auto;
      min-width: 0;
      padding: 32px 40px 80px;
    }
    .main-inner {
      max-width: var(--main-max);
      margin: 0 auto;
    }

    /* ====== Typography in main ====== */
    .main h1 { font-size: 1.9em; margin-top: 0; }
    .main h2 { font-size: 1.4em; margin-top: 1.6em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
    .main h3 { font-size: 1.15em; margin-top: 1.4em; }
    .main img { max-width: 100%; }

    .main blockquote {
      border-left: 4px solid var(--link);
      margin: 1em 0;
      padding: 0.4em 1em;
      color: var(--muted);
      background: var(--code-bg);
      border-radius: 0 4px 4px 0;
    }

    .main code {
      background: var(--code-bg);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }
    .main pre {
      background: var(--code-bg);
      padding: 12px 14px;
      border-radius: 6px;
      overflow-x: auto;
      line-height: 1.45;
    }
    .main pre code { background: transparent; padding: 0; }

    .main table {
      border-collapse: collapse;
      margin: 1em 0;
      width: 100%;
    }
    .main th, .main td { border: 1px solid var(--border); padding: 6px 12px; }
    .main th { background: var(--code-bg); }

    /* ====== Footer ====== */
    footer.site {
      position: fixed;
      bottom: 0;
      right: 0;
      padding: 10px;
      font-size: 13px;
      color: var(--muted);
      background: var(--bg);
    }
    footer.site a { color: var(--muted); }

    /* ====== Homepage blocks ====== */
    .home-hero { padding: 8px 0 18px; }
    .home-hero h1 { margin: 0 0 8px; font-size: 2em; }
    .home-hero .tagline { color: var(--muted); margin: 4px 0; }

    .home-contact {
      margin: 18px 0;
      padding: 14px 16px;
      background: var(--code-bg);
      border-radius: 8px;
      font-size: 0.95em;
    }
    .home-contact p { margin: 4px 0; }

    /* ====== Post page ====== */
    .post-header { margin-bottom: 18px; }
    .post-header .back { font-size: 0.85em; color: var(--muted); }
    .post-header h1 { margin: 6px 0 0; }
    .post-header .post-date { font-size: 0.85em; color: var(--muted); margin: 4px 0 0; }

    /* ====== Mobile: sidebar collapses to top ====== */
    @media (max-width: 820px) {
      .layout { flex-direction: column; }
      .sidebar {
        position: static;
        width: 100%;
        flex: 0 0 auto;
        height: auto;
        max-height: 40vh;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 14px 16px;
      }
      .main { padding: 24px 18px 80px; }
    }
  </style>
</head>

<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-brand"><a href="/">{{ site.title }}</a></div>
      <nav class="sidebar-nav">
        <h3>和 AI 聊天系列</h3>
        <ul>
          {% for post in site['ai-chat'] %}
          <li><a href="{{ post.permalink }}" {% if page.url == post.permalink %}class="active"{% endif %}>{{ post.title }}</a></li>
          {% endfor %}
        </ul>

        <h3>UGC 相关</h3>
        <ul>
          {% for post in site['ugc'] %}
          <li><a href="{{ post.permalink }}" {% if page.url == post.permalink %}class="active"{% endif %}>{{ post.title }}</a></li>
          {% endfor %}
        </ul>






      </nav>
    </aside>

    <main class="main">
      <div class="main-inner">
        {{ content }}
      </div>
    </main>
  </div>

  <footer class="site">
    <a href="http://beian.miit.gov.cn">黑ICP备16001198号-1</a>
  </footer>

  <script type="text/javascript">
    (function (c, l, a, r, i, t, y) {
      c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments) };
      t = l.createElement(r); t.async = 1; t.src = "https://www.clarity.ms/tag/" + i;
      y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
    })(window, document, "clarity", "script", "qk8jzgjvf7");
  </script>
</body>

</html>
