                    // 等待动画结束后设置display: none
                    setTimeout(() => {
                        if (!settingsPanel.classList.contains('open')) {
                            settingsPanel.style.display = 'none';
                        }
                    }, 300); // 与CSS transition时间一致
                } else {
                    // 打开面板：先设置display: block，然后添加open类触发动画
                    settingsPanel.style.display = 'block';
                    // 强制重绘以确保动画生效
                    settingsPanel.offsetHeight;
                    settingsPanel.classList.add('open');
                    settingsToggleBtn.textContent = '✖️';
                }
            });
            
            // 点击面板外部关闭
            document.addEventListener('click', (e) => {
                if (!settingsPanel.contains(e.target) && !settingsToggleBtn.contains(e.target)) {
                    if (settingsPanel.classList.contains('open')) {
                        settingsPanel.classList.remove('open');
                        settingsToggleBtn.textContent = '⚙️';
                        
                        // 等待动画结束后设置display: none
                        setTimeout(() => {
                            if (!settingsPanel.classList.contains('open')) {
                                settingsPanel.style.display = 'none';
                            }
                        }, 300);
                    }
                }
            });
            
            // Marker选择器事件
            if (markerSelect) {
                markerSelect.addEventListener('change', (e) => {
                    selectedMarker = e.target.value;
                    updateMarkerPreview();
                    updateMarkerPaths();
                    // 保存到localStorage
                    localStorage.setItem('selectedMarker', selectedMarker);
                    console.log(`Marker已更改为: ${selectedMarker}`);
                    
                    // 提示用户需要重新加载资源
                    alert('Marker已更改，请点击重玩按钮重新加载资源以应用更改。');
                });
            }
            
            // 判定延迟设置事件
            if (judgmentDelayInput) {
                judgmentDelayInput.addEventListener('change', (e) => {
                    let delay = parseInt(e.target.value) || 0;
                    
                    // 限制在 -50 到 50 之间
                    delay = Math.max(-50, Math.min(50, delay));
                    
                    e.target.value = delay;
                    judgmentDelay = delay;
                    localStorage.setItem('judgmentDelay', delay.toString());
                    console.log(`判定延迟已保存: ${delay}ms`);
                });
            }
            
            // 加载歌曲按钮
            if (loadSongBtn && songFileInput) {
                loadSongBtn.addEventListener('click', () => {
                    songFileInput.click();
                });
                
                songFileInput.addEventListener('change', (e) => {
                    const songFile = e.target.files[0];
                    if (!songFile) return;
                    
                    console.log('选择的歌曲文件:', songFile.name);
                    
                    // 读取歌曲文件
                    const reader = new FileReader();
                    reader.onload = async (event) => {
                        try {
                            const arrayBuffer = event.target.result;
                            audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                            console.log('歌曲加载成功');
                            
                            // 读取MP3元数据（标题、艺术家、封面）
                            readMP3Metadata(songFile);
                            
                            alert('歌曲加载成功！请再次点击📄谱面按钮选择谱面文件。');
                        } catch (error) {
                            console.error('歌曲解码失败:', error);
                            alert('歌曲文件格式不支持或损坏');
                        }
                    };
                    reader.readAsArrayBuffer(songFile);
                    
                    // 清空input，允许重复选择同一文件
                    e.target.value = '';
                });
            }
            
            // 加载谱面按钮
            if (loadChartBtn && chartFileInput) {
                loadChartBtn.addEventListener('click', () => {
                    chartFileInput.click();
                });
                
                chartFileInput.addEventListener('change', (e) => {
                    const chartFile = e.target.files[0];
                    if (!chartFile) return;
                    
                    console.log('选择的谱面文件:', chartFile.name);
                    
                    // 读取谱面文件
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const text = event.target.result;
                            parseChartText(text);
                            
                            // 更新UI显示
                            const songArtistElement = document.getElementById('songArtist');
                            if (songArtistElement) {
                                songArtistElement.textContent = '本地文件';
                            }
                            
                            console.log('谱面加载成功');
                            alert('谱面加载成功！点击播放按钮开始游戏。');
                        } catch (error) {
                            console.error('谱面解析失败:', error);
                            alert('谱面文件格式不正确');
                        }
                    };
                    reader.readAsText(chartFile);
                    
                    // 清空input，允许重复选择同一文件
                    e.target.value = '';
                });
            }
            
            // 自动播放按钮
            if (autoPlayButton) {
                autoPlayButton.addEventListener('click', () => {
                    autoPlayMode = !autoPlayMode;
                    localStorage.setItem('autoPlayMode', autoPlayMode.toString());
                    updateAutoPlayButtonUI();
                    console.log(`自动播放模式: ${autoPlayMode ? '开启' : '关闭'}`);
                });
            }
        }
        
        // 更新自动播放按钮UI
        function updateAutoPlayButtonUI() {
            if (autoPlayButton) {
                if (autoPlayMode) {
                    autoPlayButton.classList.add('active');
                } else {
                    autoPlayButton.classList.remove('active');
                }
            }
            updateAutoPlayUI();
        }
        
        // 应用小屏模式
        function applySmallScreenMode(isSmallScreen) {
            const pixiContainer = document.getElementById('pixiContainer');
            if (pixiContainer) {
                if (isSmallScreen) {
                    pixiContainer.style.transform = 'translateX(-50%) scale(1.25)';
                } else {
                    pixiContainer.style.transform = 'translateX(-50%)';
                }
            }
        }
        
        // 更新自动播放UI
        function updateAutoPlayUI() {
            if (autoPlayMode) {
                // 显示Autoplay文本
                if (autoplayText) {
                    autoplayText.visible = true;
                    autoplayText.alpha = 1;
                }
            } else {
                // 显示统计信息
                const infoContainer = document.getElementById('infoContainer');
                if (infoContainer) {
                    infoContainer.style.display = 'block';
                }
                
                // 显示Combo显示
                if (comboText) {
                    comboText.visible = true;
                }
                if (comboLabelText) {
                    comboLabelText.visible = true;
                }
                
                // 隐藏Autoplay文本
                if (autoplayText) {
                    autoplayText.visible = false;
                    autoplayText.alpha = 0;
                }
            }
        }
        
        // 更新marker预览图
        function updateMarkerPreview() {
            const previewImg = document.getElementById('markerPreview');
            if (previewImg) {
                previewImg.src = `./markers/${selectedMarker}/preview.png`;
            }
        }
        
        // 全屏功能
        function enterFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen().catch(err => {
                    console.log('全屏请求被拒绝或失败:', err);
                });
            } else if (elem.webkitRequestFullscreen) { /* Safari */
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) { /* IE11 */
                elem.msRequestFullscreen();
            }
        }
        
        // 退出全屏
        function exitFullscreen() {
            if (document.exitFullscreen) {
                document.exitFullscreen().catch(err => {
                    console.log('退出全屏失败:', err);
                });
            } else if (document.webkitExitFullscreen) { /* Safari */
                document.webkitExitFullscreen();
            } else if (document.msExitFullscreen) { /* IE11 */
                document.msExitFullscreen();
            }
        }
        
        // 切换全屏
        function toggleFullscreen() {
            if (document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement) {
                // 当前是全屏状态，退出全屏
                exitFullscreen();
            } else {
                // 当前不是全屏状态，进入全屏
                enterFullscreen();
            }
        }
        
        // 更新全屏按钮图标
        function updateFullscreenButton() {
            const fullscreenButton = document.getElementById('fullscreenButton');
            if (fullscreenButton) {
                const isFullscreen = document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement;
                fullscreenButton.textContent = isFullscreen ? '⛶' : '⛶';
                fullscreenButton.title = isFullscreen ? '退出全屏' : '全屏';
            }
        }


        // 定位网格使其居底
        // 初始创建网格
        createGrid();
        
        // 动画循环 - 同步帧动画和音频
        app.ticker.add(() => {
            // 始终更新Start Here提示（即使未播放）
            updateStartHereHints();
            
            // 更新粒子效果
            updateParticles();
            
            // 如果游戏未结束，更新Combo显示
            if (!isGameEnded) {
                updateComboDisplay();
            }
            
            if (isPlaying && audioContext) {
                const currentTime = getCurrentTime() * 1000; // 转换为毫秒
                updateNotes(currentTime);
                updateProgress(); // 更新进度条
            }
        });

        // 窗口大小改变时重新调整
        let resizeTimeout;
        function handleResize() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                const newSize = getContainerSize();
                
                // 防止尺寸为0导致计算错误
                if (newSize.width <= 0 || newSize.height <= 0) return;
                
                app.renderer.resize(newSize.width, newSize.height);
                
                // 更新专辑封面大小
                updateAlbumCoverSize();
                
                // 重新创建网格
                createGrid();
                
                console.log(`窗口调整完成: ${newSize.width}x${newSize.height}, cellSize: ${cellSize}`);
            }, 150); // 增加防抖时间到150ms
        }
        
        window.addEventListener('resize', handleResize);
        
        // 移除之前多余的 checkWindowSize 逻辑，避免与 resize 事件冲突导致元素丢失
        
        // 解析URL参数（必须在initAudio和loadChart之前）
        parseURLParams();
        
        // 预加载所有资源，然后初始化游戏
        async function initializeGame() {
            try {
                // 显示加载提示
                const loadingDiv = document.createElement('div');
                loadingDiv.id = 'loadingIndicator';
                loadingDiv.style.cssText = `
                    position: fixed;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                    color: white;
                    font-family: Arial, sans-serif;
                    font-size: 18px;
                    z-index: 1000;
                    text-align: center;
                `;
                loadingDiv.innerHTML = '<div>正在加载资源...</div><div id="loadingPercent" style="margin-top: 10px; font-size: 14px;">0%</div>';
                document.body.appendChild(loadingDiv);
                
                // 首先加载manifest.txt获取歌曲信息
                await loadManifest();
                
                // 预加载所有资源
                await preloadAllResources();
                
                // 移除加载提示
                if (loadingDiv.parentNode) {
                    loadingDiv.parentNode.removeChild(loadingDiv);
                }
                
                console.log('资源加载完成，开始初始化游戏...');
                
                // 初始化音频
                initAudio();
                
                // 加载谱面
                loadChart();
                
            } catch (error) {
                console.error('游戏初始化失败:', error);
                const loadingDiv = document.getElementById('loadingIndicator');
                if (loadingDiv) {
                    loadingDiv.innerHTML = '<div style="color: red;">加载失败，请刷新页面重试</div>';
                }
            }
        }
        
        // 启动游戏初始化
        initializeGame();
        
        // DOM进度条相关元素
        const domProgressContainer = document.getElementById('progressContainer');
        const progressBarWrapper = document.getElementById('progressBarWrapper');
        const progressBarFill = document.getElementById('progressBarFill');
        const judgmentMarksContainer = document.getElementById('judgmentMarks');
        
        // 立即显示进度条（在加载完成后）
        domProgressContainer.style.display = 'flex';
        
        // 添加判定标记到进度条
        function addJudgmentMark(judgment, noteTime) {
            if (!audioBuffer || !judgmentMarksContainer) return;
            
            const duration = audioBuffer.duration;
            const progress = noteTime / (duration * 1000); // 转换为秒
            const clampedProgress = Math.max(0, Math.min(1, progress));
            
            const mark = document.createElement('div');
            mark.className = `judgment-mark mark-${judgment}`;
            
            const isLandscape = window.innerWidth > window.innerHeight;
            if (isLandscape) {
                // 横屏模式：根据高度定位（从下往上）
                mark.style.bottom = (clampedProgress * 100) + '%';
            } else {
                // 竖屏模式：根据宽度定位（从左往右）
                mark.style.left = (clampedProgress * 100) + '%';
            }
            
            judgmentMarksContainer.appendChild(mark);
        }
        
        // 清除所有判定标记
        function clearJudgmentMarks() {
            if (judgmentMarksContainer) {
                judgmentMarksContainer.innerHTML = '';
            }
        }
        
        // 清除指定时间之后的判定标记
        function clearJudgmentMarksAfterTime(timeMs) {
            if (!judgmentMarksContainer || !audioBuffer) return;
            
            const duration = audioBuffer.duration;
            const timeSeconds = timeMs / 1000;
            const progressThreshold = timeSeconds / duration;
            
            const marks = judgmentMarksContainer.querySelectorAll('.judgment-mark');
            let removedCount = 0;
            
            marks.forEach(mark => {
                // 获取标记的位置
                let markProgress;
                const isLandscape = window.innerWidth > window.innerHeight;
                
                if (isLandscape) {
                    // 横屏模式：从bottom样式获取
                    const bottomPercent = parseFloat(mark.style.bottom);
                    markProgress = bottomPercent / 100;
                } else {
                    // 竖屏模式：从left样式获取
                    const leftPercent = parseFloat(mark.style.left);
                    markProgress = leftPercent / 100;
                }
                
                // 如果标记位置在目标时间之后，移除它
                if (markProgress > progressThreshold) {
                    mark.remove();
                    removedCount++;
                }
            });
            
            console.log(`清除了${removedCount}个进度${timeMs}ms之后的判定标记`);
        }
        
        // 更新DOM进度条
        function updateProgress() {
            if (!isPlaying || !audioBuffer) return;
            
            const currentTime = getCurrentTime();
            const duration = audioBuffer.duration;
            const progress = Math.min(currentTime / duration, 1);
            const percent = progress * 100;
            
            // 检测当前是横屏还是竖屏
            const isLandscape = window.innerWidth > window.innerHeight;
            
            if (isLandscape) {
                // 横屏模式：更新高度（从下往上）
                progressBarFill.style.height = percent + '%';
                progressBarFill.style.width = '100%';
            } else {
                // 竖屏模式：更新宽度（从左往右）
                progressBarFill.style.width = percent + '%';
                progressBarFill.style.height = '100%';
            }
        }
        
        // 进度条点击事件
        progressBarWrapper.addEventListener('click', (e) => {
            if (!audioBuffer) {
                console.log('音频未加载');
                return;
            }
            
            const rect = progressBarWrapper.getBoundingClientRect();
            const isLandscape = window.innerWidth > window.innerHeight;
            let progress;
            
            if (isLandscape) {
                // 横屏模式：根据Y轴计算（从下往上）
                // rect.bottom是底部坐标，e.clientY是点击位置的Y坐标
                // 从底部开始的距离 = rect.bottom - e.clientY
                const clickY = rect.bottom - e.clientY;
                progress = clickY / rect.height;
                console.log('横屏点击:', { 
                    rectBottom: rect.bottom, 
                    clientY: e.clientY, 
                    clickY: clickY, 
                    height: rect.height,
                    progress: progress 
                });
            } else {
                // 竖屏模式：根据X轴计算（从左往右）
                const clickX = e.clientX - rect.left;
                progress = clickX / rect.width;
            }
            
            const clampedProgress = Math.max(0, Math.min(1, progress));
            
            const duration = audioBuffer.duration;
            const newTime = duration * clampedProgress;
            
            console.log('点击进度条:', {
                progress: clampedProgress,
                newTime: newTime,
                wasPlaying: isPlaying,
                currentPauseTime: pauseTime
            });
            
            // 统一调用：停止并销毁当前音源
            stopAndDestroyAudioSource();
            
            // 设置新的播放位置
            pauseTime = newTime;
            console.log('设置pauseTime为:', pauseTime);
            
            // 关键修复：调整进度后，需要清除所有已判定的note，因为时间已经改变
            judgedNotes.clear();
            console.log('已清除所有判定记录');
            
            // 智能清理：只清除新时间点之后的判定标记，保留之前的
            clearJudgmentMarksAfterTime(newTime);
            
            // 确保进度条始终显示
            domProgressContainer.style.display = 'flex';
            
            // 如果AudioContext被挂起，先恢复
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
            
            // 点击进度条后强制开始播放
            playAudio();
        });
    </script>
</body>
</html>
