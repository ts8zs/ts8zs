<html lang="zh-CN">
<head>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

            c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments) };

    <title>JSBeat</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-image: url('./bg.jpg');
            background-repeat: repeat;
            background-position: center;
            position: relative;
            height: 100vh;
            width: 100vw;
            touch-action: none; /* 禁用所有默认触摸行为 */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent; /* 移除点击高亮 */
        }
        
        /* Pixi画布容器 */
        #pixiContainer {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100vmin;
            height: 100vmin;
        }
        
        canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
            touch-action: none; /* 禁用浏览器默认触摸行为（如滚动、缩放） */
            -webkit-touch-callout: none; /* 禁用iOS长按菜单 */
            -webkit-user-select: none; /* 禁用文本选择 */
            user-select: none;
        }
        
        /* 控制按钮容器样式 */
        .controls {
            position: fixed;
            top: 25px;
            right: 10px;
            z-index: 100;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        /* 竖屏模式：按钮横向排列 */
        @media (orientation: portrait) {
            .controls {
                flex-direction: row;
            }
        }
        
        /* 横屏模式：按钮纵向排列 */
        @media (orientation: landscape) {
            .controls {
                flex-direction: column;
            }
        }
        
        .control-button {
            width: 50px; /* 增大按钮 */
            height: 50px; /* 增大按钮 */
            background-color: #505131;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px; /* 增大图标 */
        }
        
        .control-button:hover {
            background-color: #c0c624;
        }
        
        .control-button:active {
            background-color: #999c45;
        }
        
        .control-button.active {
            background-color: #4CAF50;
            color: white;
        }
        
        /* 设置面板样式 */
        .settings-panel {
            position: fixed;
            top: 0;
            right: -350px;
            width: 320px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: -5px 0 20px rgba(0,0,0,0.3);
            transition: right 0.3s ease-in-out;
            z-index: 100;
            padding: 80px 20px 20px;
            overflow-y: auto;
            display: none;
        }
        
        .settings-panel.open {
            display: block;
            right: 0;
        }
        
        .settings-title {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .setting-item {
            margin-bottom: 20px;
        }
        
        .setting-label {
            display: block;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        
        .marker-select {
            padding: 8px 12px;
            font-size: 0.9em;
            border: 2px solid #667eea;
            border-radius: 8px;
            background: white;
            color: #333;
            cursor: pointer;
            outline: none;
            transition: border-color 0.3s;
            font-weight: bold;
            width: 100%;
        }
        
        .marker-select:focus {
            border-color: #764ba2;
        }
        
        .marker-preview {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid #ddd;
            margin-top: 10px;
        }
        
        .delay-input {
            padding: 8px 12px;
            font-size: 0.9em;
            border: 2px solid #667eea;
            border-radius: 8px;
            background: white;
            color: #333;
            outline: none;
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
        }
        
        /* 自动播放开关样式 */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.3s;
            border-radius: 26px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: #667eea;
        }
        
        input:checked + .slider:before {
            transform: translateX(24px);
        }
        
        /* 歌曲信息和判定统计容器样式 */
        .info-container {
            position: fixed;
            top: 25px;
            left: 10px;
            z-index: 100;
            color: white;
            font-family: Arial, sans-serif;
            max-width: 40vw;
        }
        
        .song-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .song-artist {
            font-size: 16px;
            opacity: 0.9;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .score-display {
            font-size: 24px;
            font-weight: bold;
            margin-top: 8px;
            color: #FFD700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }
        
        .stat-item {
            margin: 3px 0;
            font-weight: bold;
            font-size: 16px;
            line-height: 1.8;
        }
        .stat-perfect { color: #FFD700; }
        .stat-great { color: #00BFFF; }
        .stat-good { color: #32CD32; }
        .stat-poor { color: #FF6347; }
        .stat-miss { color: #808080; }
        .stat-maxcombo { color: #FF69B4; }
        
        /* 进度条样式 */
        .progress-container {
            position: fixed;
            z-index: 100;
            display: flex;
            align-items: center;
        }
        
        /* 竖屏模式：进度条在顶部横向显示 */
        @media (orientation: portrait) {
            .progress-container {
                top: 0; /* 页面最顶端 */
                left: 0;
                width: 100vw;
                height: 12px; /* 增加高度 */
                flex-direction: row;
            }
            
            .progress-bar-wrapper {
                width: 100%;
                height: 12px; /* 增加高度 */
                background-color: rgba(255, 255, 255, 0.3);
                cursor: pointer;
                position: relative;
            }
            
            .progress-bar-fill {
                height: 100%;
                background-color: rgba(255, 215, 0, 0.8); /* 金黄色 */
                width: 0%;
                transition: width 0.1s linear;
            }
            
            /* 判定标记点容器 */
            .judgment-marks {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
            }
            
            /* 判定标记点 */
            .judgment-mark {
                position: absolute;
                top: 50%;
                transform: translate(-50%, -50%);
                width: 6px;
                height: 6px;
                border-radius: 50%;
                opacity: 0.8;
            }
            
            .mark-miss,
            .mark-poor {
                background-color: #808080; /* 灰色 */
            }
            
            .mark-good {
                background-color: #32CD32; /* 绿色 */
            }
            
            .mark-great {
                background-color: #00BFFF; /* 蓝色 */
            }
        }
        
        /* 横屏模式：进度条在左侧竖向显示 */
        @media (orientation: landscape) {
            .progress-container {
                top: 0; /* 页面最顶端 */
                left: 0; /* 页面最左端 */
                width: 12px; /* 增加宽度 */
                height: 100vh; /* 占满整个高度 */
                flex-direction: column;
            }
            
            .progress-bar-wrapper {
                width: 12px; /* 增加宽度 */
                height: 100%;
                background-color: rgba(255, 255, 255, 0.3);
                cursor: pointer;
                position: relative;
                display: flex;
                align-items: flex-end;
            }
            
            .progress-bar-fill {
                width: 100%;
                height: 0%;
                background-color: rgba(255, 215, 0, 0.8); /* 金黄色 */
                transition: height 0.1s linear;
            }
            
            /* 判定标记点容器 */
            .judgment-marks {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
            }
            
            /* 判定标记点 */
            .judgment-mark {
                position: absolute;
                left: 50%;
                transform: translate(-50%, -50%);
                width: 6px;
                height: 6px;
                border-radius: 50%;
                opacity: 0.8;
            }
            
            .mark-miss,
            .mark-poor {
                background-color: #808080; /* 灰色 */
            }
            
            .mark-good {
                background-color: #32CD32; /* 绿色 */
            }
            
            .mark-great {
                background-color: #00BFFF; /* 蓝色 */
            }
        }
    </style>
</head>
<body>
    <div id="pixiContainer">
        <!-- Pixi画布将在这里创建 -->
    </div>
    
    <div class="info-container" id="infoContainer">
        <div class="song-title" id="songTitle">加载中...</div>
        <div class="song-artist" id="songArtist"></div>
        <div class="score-display" id="scoreDisplay">0</div>
        <div class="stat-item stat-maxcombo">Max Combo: <span id="maxComboCount">0</span></div>
        <div class="stat-item stat-perfect">Perfect: <span id="perfectCount">0</span></div>
        <div class="stat-item stat-great">Great: <span id="greatCount">0</span></div>
        <div class="stat-item stat-good">Good: <span id="goodCount">0</span></div>
        <div class="stat-item stat-poor">Poor: <span id="poorCount">0</span></div>
        <div class="stat-item stat-miss">Miss: <span id="missCount">0</span></div>
    </div>
    
    <div class="controls">
        <button id="backButton" class="control-button" title="返回">⬅️</button>
        <button id="replayButton" class="control-button" title="重玩">🔄</button>
        <button id="playButton" class="control-button" title="播放">▶️</button>
        <button id="autoPlayButton" class="control-button" title="自动播放">🤖</button>
        <button id="fullscreenButton" class="control-button" title="全屏">⛶</button>
        <button id="settingsToggleBtn" class="control-button" title="设置">⚙️</button>
    </div>
    
    <!-- 隐藏的文件输入 -->
    <input type="file" id="songFileInput" accept=".mp3,.wav,.ogg" style="display: none;">
    <input type="file" id="chartFileInput" accept=".jmt" style="display: none;">
    
    <!-- 设置面板 -->
    <div id="settingsPanel" class="settings-panel">
        <div class="settings-title">⚙️ 设置</div>
        
        <div class="setting-item">
            <label class="setting-label">Marker:</label>
            <select id="markerSelect" class="marker-select">
                <option value="thundergate">Thundergate</option>
                <option value="flower">Flower</option>
                <option value="knit">Knit</option>
                <option value="ripples">Ripples</option>
            </select>
            <img id="markerPreview" class="marker-preview" src="./markers/thundergate/preview.png" alt="Marker Preview">
        </div>
        
        <div class="setting-item">
            <label class="setting-label">判定延迟(ms):</label>
            <input type="number" id="judgmentDelayInput" class="delay-input" value="0" min="-50" max="50" step="1">
        </div>
        
        <div class="setting-item">
            <label class="setting-label">加载文件:</label>
            <div style="display: flex; gap: 10px; margin-top: 8px;">
                <button id="loadSongBtn" class="control-button" style="width: auto; padding: 10px 15px; border-radius: 8px; font-size: 14px;" title="加载歌曲">🎵 歌曲</button>
                <button id="loadChartBtn" class="control-button" style="width: auto; padding: 10px 15px; border-radius: 8px; font-size: 14px;" title="加载谱面">📄 谱面</button>
            </div>
        </div>
        
        <div class="setting-item">
            <label class="setting-label">小屏模式:</label>
            <label class="toggle-switch">
                <input type="checkbox" id="smallScreenToggle">
                <span class="slider"></span>
            </label>
        </div>

    </div>
    
    <div class="progress-container" id="progressContainer" style="display: none;">
        <div class="progress-bar-wrapper" id="progressBarWrapper">
            <div class="progress-bar-fill" id="progressBarFill"></div>
            <div class="judgment-marks" id="judgmentMarks"></div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <script>
        // 获取容器
        const pixiContainer = document.getElementById('pixiContainer');
        
        // 计算容器大小（1:1比例）
        function getContainerSize() {
            const minDimension = Math.min(window.innerWidth, window.innerHeight);
            return { width: minDimension, height: minDimension };
        }
        
        const containerSize = getContainerSize();
        
        // 初始化Pixi应用
        const app = new PIXI.Application({
            width: containerSize.width,
            height: containerSize.height,
            backgroundColor: 0x000000, // 黑色背景
            antialias: true,
            autoDensity: true,
            resolution: window.devicePixelRatio || 1,
            eventMode: 'static', // 启用事件模式
            eventFeatures: {
                move: true,
                globalMove: false,
                click: true,
                wheel: false
            }
        });
        
        // 确保交互管理器支持多点触控
        if (app.renderer.events) {
            app.renderer.events.supportsTouchEvents = true;
            app.renderer.events.supportsPointerEvents = true;
        }
        
        pixiContainer.appendChild(app.view);
        
        // 防止画布上的默认触摸行为（滚动、缩放等）
        // 获取当前缩放因子
        function getScaleFactor() {
            const pixiContainer = document.getElementById('pixiContainer');
            if (pixiContainer) {
                const transform = pixiContainer.style.transform;
                const scaleMatch = transform.match(/scale\(([\d.]+)\)/);
                if (scaleMatch) {
                    return parseFloat(scaleMatch[1]);
                }
            }
            return 1;
        }
        
        // 获取考虑缩放后的触摸/鼠标坐标
        function getScaledCoordinates(clientX, clientY) {
            const rect = app.view.getBoundingClientRect();
            const scale = getScaleFactor();
            
            // 计算相对于画布的坐标，并除以缩放因子
            const x = (clientX - rect.left) / scale;
            const y = (clientY - rect.top) / scale;
            
            return { x, y };
        }
        
        app.view.addEventListener('touchstart', (e) => {
            e.preventDefault(); // 阻止所有默认行为
            
            console.log('=== Native TouchStart ===');
            console.log('Touch count:', e.touches.length);
            console.log('Changed touches:', e.changedTouches.length);
            
            // 处理每个新的触摸点
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                console.log('New touch ID:', touch.identifier, 'at', touch.clientX, touch.clientY);
                
                // 计算触摸点在哪个格子（考虑缩放）
                const { x, y } = getScaledCoordinates(touch.clientX, touch.clientY);
                const col = Math.floor(x / cellSize);
                const row = Math.floor(y / cellSize);
                
                if (col >= 0 && col < gridSize && row >= 0 && row < gridSize) {
                    const buttonIndex = row * gridSize + col;
                    const button = playButtons[buttonIndex];
                    
                    if (button) {
                        console.log('Touch', touch.identifier, 'on button', buttonIndex, '[', row, ',', col, ']');
                        
                        // 按下按钮
                        button.texture = playButtonDownTexture;
                        touchButtonMap.set(touch.identifier, button);
                        
                        if (!buttonTouchMap.has(button)) {
                            buttonTouchMap.set(button, new Set());
                        }
                        buttonTouchMap.get(button).add(touch.identifier);
                        
                        // 触发判定
                        handleTouch(buttonIndex);
                    }
                }
            }
            
            console.log('Current touches:', touchButtonMap.size);
            console.log('=========================\n');
        }, { passive: false });
        
        app.view.addEventListener('touchmove', (e) => {
            e.preventDefault(); // 阻止触摸移动时的滚动
            
            // 处理移动的触摸点
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                const oldButton = touchButtonMap.get(touch.identifier);
                
                // 计算新位置（考虑缩放）
                const { x, y } = getScaledCoordinates(touch.clientX, touch.clientY);
                const col = Math.floor(x / cellSize);
                const row = Math.floor(y / cellSize);
                
                if (col >= 0 && col < gridSize && row >= 0 && row < gridSize) {
                    const buttonIndex = row * gridSize + col;
                    const newButton = playButtons[buttonIndex];
                    
                    // 如果移动到了新按钮
                    if (newButton && newButton !== oldButton) {
                        console.log('Touch', touch.identifier, 'moved from', oldButton ? 'btn' : 'none', 'to button', buttonIndex);
                        
                        // 释放旧按钮
                        if (oldButton) {
                            const oldTouches = buttonTouchMap.get(oldButton);
                            if (oldTouches) {
                                oldTouches.delete(touch.identifier);
                                if (oldTouches.size === 0) {
                                    oldButton.texture = playButtonUpTexture;
                                    buttonTouchMap.delete(oldButton);
                                }
                            }
                        }
                        
                        // 按下新按钮
                        newButton.texture = playButtonDownTexture;
                        touchButtonMap.set(touch.identifier, newButton);
                        
                        if (!buttonTouchMap.has(newButton)) {
                            buttonTouchMap.set(newButton, new Set());
                        }
                        buttonTouchMap.get(newButton).add(touch.identifier);
                        
                        // 触发判定
                        handleTouch(buttonIndex);
                    }
                }
            }
        }, { passive: false });
        
        app.view.addEventListener('touchend', (e) => {
            e.preventDefault();
            
            console.log('=== Native TouchEnd ===');
            console.log('Touch count:', e.touches.length);
            console.log('Changed touches:', e.changedTouches.length);
            
            // 处理结束的触摸点
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                const button = touchButtonMap.get(touch.identifier);
                
                console.log('Touch', touch.identifier, 'ended');
                
                if (button) {
                    console.log('Releasing button for touch', touch.identifier);
                    
                    // 从按钮的touch集合中移除
                    const touches = buttonTouchMap.get(button);
                    if (touches) {
                        touches.delete(touch.identifier);
                        
                        if (touches.size === 0) {
                            button.texture = playButtonUpTexture;
                            buttonTouchMap.delete(button);
                            console.log('Button released - no more touches');
                        } else {
                            console.log('Button still held by', touches.size, 'other touch(es)');
                        }
                    }
                    
                    touchButtonMap.delete(touch.identifier);
                }
            }
            
            console.log('Current touches:', touchButtonMap.size);
            console.log('=========================\n');
        }, { passive: false });
        
        app.view.addEventListener('touchcancel', (e) => {
            e.preventDefault();
            
            // 处理被取消的触摸点
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                const button = touchButtonMap.get(touch.identifier);
                
                if (button) {
                    const touches = buttonTouchMap.get(button);
                    if (touches) {
                        touches.delete(touch.identifier);
                        if (touches.size === 0) {
                            button.texture = playButtonUpTexture;
                            buttonTouchMap.delete(button);
                        }
                    }
                    touchButtonMap.delete(touch.identifier);
                }
            }
        }, { passive: false });
        
        // 防止整个文档的默认触摸行为
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });
        
        document.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });
        
        document.addEventListener('gesturestart', (e) => {
            e.preventDefault(); // 阻止手势开始（如捏合缩放）
        });
        
        document.addEventListener('gesturechange', (e) => {
            e.preventDefault(); // 阻止手势变化
        });
        
        document.addEventListener('gestureend', (e) => {
            e.preventDefault(); // 阻止手势结束
        });
        
        // 键盘事件处理
        const keyToButtonMap = {
            'Digit4': 0, 'Digit5': 1, 'Digit6': 2, 'Digit7': 3,  // 第一排
            'KeyR': 4, 'KeyT': 5, 'KeyY': 6, 'KeyU': 7,  // 第二排
            'KeyF': 8, 'KeyG': 9, 'KeyH': 10, 'KeyJ': 11, // 第三排
            'KeyV': 12, 'KeyB': 13, 'KeyN': 14, 'KeyM': 15,
            'Digit8': 3,  // 8键同7键
            'KeyC': 12     // c键同v键
        };
        
        // 跟踪按下的键
        const pressedKeys = new Set();
        
        document.addEventListener('keydown', (e) => {
            // 防止重复触发
            if (pressedKeys.has(e.code)) return;
            pressedKeys.add(e.code);
            
            const buttonIndex = keyToButtonMap[e.code];
            if (buttonIndex !== undefined && playButtons[buttonIndex]) {
                // 按下按钮

        // 创建粒子效果
        function spawnParticles(x, y, color = 0xffffff) {
            const particleCount = 8;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = new PIXI.Graphics();
                
                // 绘制小圆点
                particle.beginFill(color);
                particle.drawCircle(0, 0, 3);
                particle.endFill();
                
                // 设置初始位置
                particle.x = x;
                particle.y = y;
                
                // 随机速度和方向
                const angle = (Math.PI * 2 / particleCount) * i + (Math.random() - 0.5);
                const speed = 2 + Math.random() * 3;
                particle.vx = Math.cos(angle) * speed;
                particle.vy = Math.sin(angle) * speed;
                
                // 生命周期
                particle.life = 1.0;
                particle.decay = 0.02 + Math.random() * 0.02;
                
                particleContainer.addChild(particle);
                particles.push(particle);
            }
        }
        
        // 更新粒子
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const particle = particles[i];
                
                // 更新位置
                particle.x += particle.vx;
                particle.y += particle.vy;
                
                // 衰减
                particle.life -= particle.decay;
                particle.alpha = particle.life;
                
                // 缩小
                particle.scale.set(particle.life);
                
                // 移除死亡粒子
                if (particle.life <= 0) {
                    particleContainer.removeChild(particle);
                    particle.destroy();
                    particles.splice(i, 1);
                }
            }
        }

            // 保存所有note的引用

            const savedTouchAnimations = [];
            savedNotes.forEach(note => {
                if (note.touchAnimation) {
                    savedTouchAnimations.push({
                        note: note,
                        animation: note.touchAnimation
                    });
                }
            });
            
            // 清除现有的图形
            gridContainer.removeChildren();

                // 重新设置层级，放在button下层
                const buttonIndex = item.note.row * gridSize + item.note.col;
                const button = playButtons[buttonIndex];
                if (button && button.parent === gridContainer) {
                    const buttonChildIndex = gridContainer.getChildIndex(button);
                    gridContainer.setChildIndex(item.animation, buttonChildIndex - 1);
                }
            });
            
            // 网格占满整个画布
            cellSize = Math.floor(app.screen.width / gridSize);
            
            gridWidth = cellSize * gridSize;
            gridHeight = cellSize * gridSize;

            // 创建网格线
            for (let i = 0; i <= gridSize; i++) {
                // 垂直线
                const vLine = new PIXI.Graphics();
                vLine.lineStyle(2, 0xffffff, 1);
                vLine.moveTo(i * cellSize, 0);
                vLine.lineTo(i * cellSize, gridHeight);
                gridContainer.addChild(vLine);
                
                // 水平线
                const hLine = new PIXI.Graphics();
                hLine.lineStyle(2, 0xffffff, 1);
                hLine.moveTo(0, i * cellSize);
                hLine.lineTo(gridWidth, i * cellSize);
                gridContainer.addChild(hLine);
            }
            
            // 为每个单元格添加背景色（可选）
            for (let row = 0; row < gridSize; row++) {
                for (let col = 0; col < gridSize; col++) {
                    const cell = new PIXI.Graphics();
                    // 黑色背景
                    cell.beginFill(0x000000, 0.5);
                    cell.drawRect(col * cellSize, row * cellSize, cellSize, cellSize);
                    cell.endFill();
                    gridContainer.addChildAt(cell, 0); // 放在底层
                }
            }
            
            // 更新所有note的位置和大小
            updateAllNotesPosition();
            
            // 如果有已存在的notes，重新添加到容器
            if (savedNotes.length > 0) {
                notes.length = 0; // 清空当前数组
                savedNotes.forEach(note => {
                    notes.push(note);
                    gridContainer.addChild(note.animation);
                    gridContainer.addChild(note.touchPerfectAnimation);
                });
                updateAllNotesPosition();
            }
            
            // 为每个格子添加play_button图片
            playButtons.length = 0; // 清空数组
            for (let row = 0; row < gridSize; row++) {
                for (let col = 0; col < gridSize; col++) {
                    try {
                        const button = new PIXI.Sprite(playButtonUpTexture);
                        button.anchor.set(0.5);
                        button.x = col * cellSize + cellSize / 2;
                        button.y = row * cellSize + cellSize / 2;
                        
                        // 占满整个格子
                        button.width = cellSize;
                        button.height = cellSize;
                        
                        // 添加交互事件（仅用于显示手型光标，不处理事件）
                        button.interactive = true;
                        button.buttonMode = true;
                        button.cursor = 'pointer';
                        const cellIndex = row * gridSize + col;
                        button._row = row; // 存储行号
                        button._col = col; // 存储列号
                        
                        // 注意：不使用 PixiJS 的 pointer 事件，改用原生 touch 事件
                        // 原生 touch 事件在 app.view 上统一处理，能正确识别多点触控
                        
                        // 触摸离开按钮区域时不恢复状态，保持按下态直到pointerup
                        
                        gridContainer.addChild(button);
                        playButtons.push(button);
                    } catch (e) {
                        console.log('加载play_button失败:', e);
                    }
                }
            }
            
            // 注意：不使用 PixiJS 的 pointer 事件，改用原生 touch 事件
            // 原生 touch 事件在 app.view 上统一处理，能正确识别多点触控
            // gridContainer 不需要设置 interactive
            
            // 确保play_button在所有note之上（但不包括粒子容器）
            const maxIndex = gridContainer.children.length - 1; // particleContainer的索引
            playButtons.forEach((button, index) => {
                gridContainer.setChildIndex(button, maxIndex - playButtons.length + index);
            });
            
            // 确保粒子容器在最顶层
            gridContainer.setChildIndex(particleContainer, gridContainer.children.length - 1);
            
            // 更新Start Here提示（也在顶层）
            updateStartHereHints();
        }

            if (!comboText || !comboLabelText) return;
            
            if (combo > 0) {
                comboText.text = combo.toString();
                comboText.visible = true;
                comboText.alpha = Math.min(1, comboText.alpha + 0.1);
                
                comboLabelText.visible = true;
                comboLabelText.alpha = Math.min(1, comboLabelText.alpha + 0.1);
                
                // 检测combo是否增加
                if (combo > lastCombo) {
                    // Combo增加时，放大到1.3倍
                    comboText.scale.set(1.3);
                    lastCombo = combo;
                } else {
                    // 逐渐缩小到正常大小
                    const currentScale = comboText.scale.x;
                    if (currentScale > 1.0) {
                        const newScale = Math.max(1.0, currentScale - 0.05);
                        comboText.scale.set(newScale);
                    }
                }
            } else {
                comboText.alpha = Math.max(0, comboText.alpha - 0.1);
                comboLabelText.alpha = Math.max(0, comboLabelText.alpha - 0.1);
                
                if (comboText.alpha <= 0) {
                    comboText.visible = false;
                    comboLabelText.visible = false;
                }
                
                // 重置combo时，也重置lastCombo
                if (combo === 0) {
                    lastCombo = 0;
                    comboText.scale.set(1);
                }
            }
        }

        // 计算并更新分数
        function updateScore() {
            const totalNotes = chartData.length;
            if (totalNotes === 0) {
                score = 0;
            } else {
                // 分数计算公式：（PERFECT數+GREAT數×70%+GOOD數×40%+POOR數×10%）÷總note數×1000000
                const weightedSum = stats.perfect + 
                                   stats.great * 0.7 + 
                                   stats.good * 0.4 + 
                                   stats.poor * 0.1;
                score = Math.floor((weightedSum / totalNotes) * 1000000);
            }
            
            // 格式化分数显示（添加千位分隔符）
            const scoreElement = document.getElementById('scoreDisplay');
            if (scoreElement) {
                scoreElement.textContent = score.toLocaleString();
            }
        }
        
        // 根据分数计算等级
        function calculateGrade(score) {
            if (score >= 1000000) return 'EXCELLENT';
            if (score >= 980000) return 'SSS';
            if (score >= 950000) return 'SS';
            if (score >= 900000) return 'S';
            if (score >= 850000) return 'A';
            if (score >= 800000) return 'B';
            if (score >= 700000) return 'C';
            if (score >= 500000) return 'D';
            return 'E';
        }
        
        // 获取等级的颜色
        function getGradeColor(grade) {
            switch(grade) {
                case 'EXCELLENT': return '#FFD700'; // 金色
                case 'SSS': return '#FF69B4'; // 粉色
                case 'SS': return '#FF4500'; // 橙红色
                case 'S': return '#FFD700'; // 金色
                case 'A': return '#32CD32'; // 绿色
                case 'B': return '#00BFFF'; // 蓝色
                case 'C': return '#FFFF00'; // 黄色
                case 'D': return '#FFA500'; // 橙色
                case 'E': return '#808080'; // 灰色
                default: return '#FFFFFF';
            }
        }

        // 读取MP3元数据（标题、艺术家、封面）
        function readMP3Metadata(file) {
            if (typeof jsmediatags === 'undefined') {
                console.warn('jsmediatags库未加载');
                // 如果库未加载，使用文件名作为标题
                const songTitleElement = document.getElementById('songTitle');
                if (songTitleElement) {
                    songTitleElement.textContent = file.name.replace(/\.[^/.]+$/, "");
                }
                return;
            }
            
            jsmediatags.read(file, {
                onSuccess: function(tag) {
                    console.log('MP3元数据:', tag);
                    
                    const tags = tag.tags;
                    
                    // 更新歌曲标题
                    const songTitleElement = document.getElementById('songTitle');
                    if (songTitleElement) {
                        songTitleElement.textContent = tags.title || file.name.replace(/\.[^/.]+$/, "");
                    }
                    
                    // 更新艺术家
                    const songArtistElement = document.getElementById('songArtist');
                    if (songArtistElement) {
                        songArtistElement.textContent = tags.artist || '未知艺术家';
                    }
                    
                    // 处理封面图片
                    if (tags.picture) {
                        const picture = tags.picture;
                        const base64String = arrayBufferToBase64(picture.data);
                        const imageUrl = `data:${picture.format};base64,${base64String}`;
                        
                        // 设置专辑封面背景
                        setAlbumCoverBackground(imageUrl);
                        
                        console.log('封面图片已加载');
                    } else {
                        console.log('MP3文件中没有封面图片');
                    }
                },
                onError: function(error) {
                    console.error('读取MP3元数据失败:', error);
                    // 失败时使用文件名作为标题
                    const songTitleElement = document.getElementById('songTitle');
                    if (songTitleElement) {
                        songTitleElement.textContent = file.name.replace(/\.[^/.]+$/, "");
                    }
                }
            });
        }
        
        // 将ArrayBuffer转换为Base64
        function arrayBufferToBase64(buffer) {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            const len = bytes.byteLength;
            for (let i = 0; i < len; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return window.btoa(binary);
        }
        
        // 设置专辑封面背景
        function setAlbumCoverBackground(imageUrl) {
            // 清除旧的封面
            albumCoverContainer.removeChildren();
            
            // 创建新的封面精灵
            PIXI.Texture.fromURL(imageUrl).then(texture => {
                const sprite = new PIXI.Sprite(texture);
                
                // 计算缩放比例，保持宽高比并覆盖整个容器
                const scaleX = app.screen.width / texture.width;
                const scaleY = app.screen.height / texture.height;
                const scale = Math.max(scaleX, scaleY);
                
                sprite.scale.set(scale);
                sprite.anchor.set(0.5);
                sprite.x = app.screen.width / 2;
                sprite.y = app.screen.height / 2;
                
                // 添加模糊效果
                const blurFilter = new PIXI.BlurFilter();
                blurFilter.blur = 8;
                blurFilter.quality = 4;
                sprite.filters = [blurFilter];
                
                // 降低透明度
                sprite.alpha = 0.6;
                
                albumCoverContainer.addChild(sprite);
                
                console.log('专辑封面背景已设置');
            }).catch(error => {
                console.error('加载专辑封面失败:', error);
            });
        }
        
        // 解析谱面文本（可重用）
        function parseChartText(text) {
            const lines = text.split('\n');
            chartData = [];
            
            for (const line of lines) {
                const trimmed = line.trim();
                if (trimmed.startsWith('#')) {
                    // 格式: #格子编号.毫秒数
                    const content = trimmed.substring(1);
                    const dotIndex = content.indexOf('.');
                    
                    if (dotIndex !== -1) {
                        const cellNumber = parseInt(content.substring(0, dotIndex));
                        const timeMs = parseInt(content.substring(dotIndex + 1));
                        
                        // 将格子编号转换为行列 (1-16 -> 0-15)
                        const cellIndex = cellNumber - 1;
                        const row = Math.floor(cellIndex / 4);
                        const col = cellIndex % 4;
                        
                        chartData.push({
                            cellIndex: cellIndex,
                            row: row,
                            col: col,
                            time: timeMs
                        });
                    }
                }
            }
            
            // 按时间排序
            chartData.sort((a, b) => a.time - b.time);
            
            console.log(`谱面加载成功，共 ${chartData.length} 个note`);
            
            // 初始化所有格子的note
            initNotes();
        }
        
        // 初始化所有格子的note对象
        function initNotes() {
            // 如果资源还未加载完成，等待后再初始化
            if (!resourcesLoaded) {
                console.warn('资源尚未加载完成，延迟初始化notes');
                setTimeout(initNotes, 100);
                return;
            }
            
            for (let i = 0; i < totalCells; i++) {
                const row = Math.floor(i / 4);
                const col = i % 4;
                
                // 使用预加载的纹理创建帧动画
                const textures = [];
                for (let frame = 1; frame <= totalFrames; frame++) {
                    const textureName = `markerBase${frame}`;
                    const texture = getTextureFromCache(textureName);
                    if (texture) {
                        textures.push(texture);
                    }
                }
                
                const animation = new PIXI.AnimatedSprite(textures);
                animation.animationSpeed = 0;
                animation.loop = false;
                animation.visible = false;
                animation.gotoAndStop(0);
                
                // 使用预加载的touch_perfect纹理
                const touchPerfectTextures = [];
                for (let frame = 1; frame <= touchPerfectFrames; frame++) {
                    const textureName = `touchPerfect${frame}`;
                    const texture = getTextureFromCache(textureName);
                    if (texture) {
                        touchPerfectTextures.push(texture);
                    }
                }
                
                const touchPerfectAnimation = new PIXI.AnimatedSprite(touchPerfectTextures);
                touchPerfectAnimation.animationSpeed = 0.8;
                touchPerfectAnimation.loop = false;
                touchPerfectAnimation.visible = false;
                touchPerfectAnimation.gotoAndStop(0);
                
                notes.push({
                    animation: animation,
                    touchPerfectAnimation: touchPerfectAnimation,
                    cellIndex: i,
                    row: row,
                    col: col,
                    currentFrame: 0,
                    isActive: false,
                    startTime: 0,
                    isTouching: false
                });
                
                gridContainer.addChild(animation);
                gridContainer.addChild(touchPerfectAnimation);
                
                // 添加交互事件
                animation.interactive = true;
                animation.buttonMode = true;
                animation.cursor = 'pointer';
                
                // 触摸/点击事件
                animation.on('pointerdown', () => handleTouch(i));
            }
            
            // 创建Start Here提示文本
            createStartHereHints();
            
            // 更新所有note的位置
            updateAllNotesPosition();
        }
        
        // 创建Start Here提示
        function createStartHereHints() {
            // 清除旧的提示
            startHereTexts.forEach(text => {
                if (text.parent) {
                    text.parent.removeChild(text);
                }
            });
            startHereTexts = [];
            
            if (chartData.length === 0) return;
            
            // 找到最早的note时间
            const sortedNotes = [...chartData].sort((a, b) => a.time - b.time);
            const earliestTime = sortedNotes[0].time;
            
            // 只找出时间完全等于最早时间的note（同时出现的）
            const simultaneousNotes = sortedNotes.filter(n => n.time === earliestTime);
            
            console.log(`最早的note时间: ${earliestTime}ms, 同时出现的note数量: ${simultaneousNotes.length}`);
            
            // 为这些同时出现的note的格子创建提示
            simultaneousNotes.forEach(note => {
                const text = new PIXI.Text('START HERE', {
                    fontFamily: 'Arial',
                    fontSize: 16,
                    fontWeight: 'bold',
                    fill: 0xffff00,
                    stroke: 0x000000,
                    strokeThickness: 3,
                    align: 'center'
                });
                text.anchor.set(0.5);
                text.visible = false;
                gridContainer.addChild(text);
                
                startHereTexts.push({
                    text: text,
                    cellIndex: note.cellIndex,
                    row: note.row,
                    col: note.col,
                    firstNoteTime: note.time
                });
            });
        }
        
        // 更新Start Here提示位置和可见性
        function updateStartHereHints() {
            if (startHereTexts.length === 0) return;
            
            const currentTime = isPlaying && audioContext ? getCurrentTime() * 1000 : 0; // 转换为毫秒
            
            startHereTexts.forEach(hint => {
                // 更新位置
                hint.text.x = hint.col * cellSize + cellSize / 2;
                hint.text.y = hint.row * cellSize + cellSize / 2;
                
                // 判断是否应该显示：在当前时间之前且距离note还有至少800ms
                const timeToNote = hint.firstNoteTime - currentTime;
                
                // 修复竞争条件：确保在游戏未开始或刚开始时也能显示提示
                if (!isPlaying || timeToNote > 800) {
                    // 游戏未播放或距离note出现还有足够时间时显示
                    hint.text.visible = true;
                    // 根据距离调整透明度，但确保至少有一定的可见度
                    let alpha = 1;
                    if (timeToNote > 3000) {
                        // 距离还很远，逐渐淡入
                        alpha = Math.min(1, (timeToNote - 3000) / 1000);
                    } else if (timeToNote > 800) {
                        // 在显示窗口内，保持完全可见
                        alpha = 1;
                    }
                    hint.text.alpha = alpha;
                } else {
                    // note已经出现或即将出现，隐藏
                    hint.text.visible = false;
                }
            });
        }
        
        // 更新所有note的位置和大小
        function updateAllNotesPosition() {
            notes.forEach(note => {
                const animSize = cellSize;
                note.animation.width = animSize;
                note.animation.height = animSize;
                note.animation.x = note.col * cellSize;
                note.animation.y = note.row * cellSize;
                
                // touch_perfect动画也需要同样的位置和大小
                note.touchPerfectAnimation.width = animSize;
                note.touchPerfectAnimation.height = animSize;
                note.touchPerfectAnimation.x = note.col * cellSize;
                note.touchPerfectAnimation.y = note.row * cellSize;
            });
            
            // 更新play_button位置
            playButtons.forEach((button, index) => {
                const row = Math.floor(index / gridSize);
                const col = index % gridSize;
                button.x = col * cellSize + cellSize / 2;
                button.y = row * cellSize + cellSize / 2;
                
                // 占满整个格子
                button.width = cellSize;
                button.height = cellSize;
                
                // 确保play_button始终在最顶层（只在按钮已添加到容器时设置）
                if (button.parent === gridContainer) {
                    gridContainer.setChildIndex(button, gridContainer.children.length - 1);
                }
            });
            
            // 也确保Start Here提示在顶层（只在文本已添加到容器时设置）
            startHereTexts.forEach(hint => {
                if (hint.text && hint.text.parent === gridContainer) {
                    gridContainer.setChildIndex(hint.text, gridContainer.children.length - 1);
                }
            });
        }
        
        // 处理触摸/点击事件
        function handleTouch(cellIndex) {
            if (!isPlaying || !audioContext) return;
            
            const currentTime = getCurrentTime() * 1000; // 转换为毫秒
            const note = notes[cellIndex];
            
            // 如果该格子正在播放touch动画，不允许再次触发
            if (note.isTouching) return;
            
            // 查找该格子最近的未被判定的note
            const cellNotes = chartData.filter(n => n.cellIndex === cellIndex);
            if (cellNotes.length === 0) return;
            
            // 找到最近的未被判定的note
            let closestNote = null;
            let minTimeDiff = Infinity;
            let closestNoteIndex = -1;
            
            for (let i = 0; i < cellNotes.length; i++) {
                const noteData = cellNotes[i];
                // 创建唯一标识符：cellIndex + time
                const noteKey = `${noteData.cellIndex}_${noteData.time}`;
                
                // 跳过已经判定过的note
                if (judgedNotes.has(noteKey)) continue;
                
                // 应用判定延迟
                const adjustedNoteTime = noteData.time + judgmentDelay;
                const timeDiff = Math.abs(currentTime - adjustedNoteTime);
                if (timeDiff < minTimeDiff) {
                    minTimeDiff = timeDiff;
                    closestNote = noteData;
                    closestNoteIndex = i;
                }
            }
            
            if (!closestNote) return;
            
            // 计算当前应该显示的帧
            const frameDuration = 1000 / 30; // 30fps
            const preDisplayFrames = 16;
            // 应用判定延迟
            const adjustedNoteTime = closestNote.time + judgmentDelay;
            const timeDiff = currentTime - adjustedNoteTime;
            
            let currentFrameIndex = -1;
            
            // 如果在预显示范围内
            if (timeDiff >= -(preDisplayFrames * frameDuration) && timeDiff < 0) {
                currentFrameIndex = Math.floor((preDisplayFrames * frameDuration + timeDiff) / frameDuration);
            }
            // 如果在命中点或后续显示范围内
            else if (timeDiff >= 0) {
                currentFrameIndex = Math.floor(timeDiff / frameDuration) + preDisplayFrames;
            }
            
            // 判定逻辑（按优先级：Perfect > Great > Good > Poor）
            let judgment = null;
            
            if (currentFrameIndex >= perfectWindowStart && currentFrameIndex <= perfectWindowEnd) {
                // Perfect
                judgment = 'perfect';
            } else {
                // 检查Great
                for (const window of greatWindows) {
                    if (currentFrameIndex >= window.start && currentFrameIndex <= window.end) {
                        judgment = 'great';
                        break;
                    }
                }
                
                if (!judgment) {
                    // 检查Good
                    for (const window of goodWindows) {
                        if (currentFrameIndex >= window.start && currentFrameIndex <= window.end) {
                            judgment = 'good';
                            break;
                        }
                    }
                }
                
                if (!judgment) {
                    // 检查Poor
                    for (const window of poorWindows) {
                        if (currentFrameIndex >= window.start && currentFrameIndex <= window.end) {
                            judgment = 'poor';
                            break;
                        }
                    }
                }
            }
            
            // 如果有判定结果，触发动画并标记为已判定
            if (judgment) {
                // 标记该note为已判定
                const noteKey = `${closestNote.cellIndex}_${closestNote.time}`;
                judgedNotes.add(noteKey);
                
                // 更新combo和统计
                if (judgment === 'poor') {
                    // Poor打断combo
                    combo = 0;
                    stats.poor++;
                } else {
                    // Perfect/Great/Good增加combo
                    combo++;
                    if (combo > maxCombo) {
                        maxCombo = combo;
                    }
                    stats[judgment]++;
                }
                
                // 添加判定标记到进度条（只标记Miss/Poor/Good/Great）
                if (judgment !== 'perfect') {
                    addJudgmentMark(judgment, closestNote.time);
                }
                
                // 更新显示
                updateStatsDisplay();
                updateComboDisplay();
                
                // 触发判定动画
                triggerTouchAnimation(note, judgment);
                
                // 播放clap音效（带10ms冷却限制）
                playClapSound();
                
                console.log(`${judgment.charAt(0).toUpperCase() + judgment.slice(1)}! Cell ${cellIndex + 1}, Frame ${currentFrameIndex + 1}, Time: ${closestNote.time}ms, Combo: ${combo}`);
            }
        }
        
        // 触发touch判定动画
        function triggerTouchAnimation(note, judgment) {
            // 立即隐藏并停止base动画，防止与判定动画重叠
            note.animation.visible = false;
            note.animation.stop();
            
            // 根据判定类型选择动画路径和前缀
            let texturePrefix;
            switch(judgment) {
                case 'perfect':
                    texturePrefix = 'touchPerfect';
                    break;
                case 'great':
                    texturePrefix = 'touchGreat';
                    break;
                case 'good':
                    texturePrefix = 'touchGood';
                    break;
                case 'poor':
                    texturePrefix = 'touchPoor';
                    break;
                default:
                    return;
            }
            
            // 如果动画对象不存在，使用预加载的纹理创建它
            if (!note.touchAnimation) {
                const touchTextures = [];
                for (let frame = 1; frame <= 15; frame++) {
                    const textureName = `${texturePrefix}${frame}`;
                    const texture = getTextureFromCache(textureName);
                    if (texture) {
                        touchTextures.push(texture);
                    }
                }
                
                if (touchTextures.length === 0) {
                    console.warn(`无法找到${judgment}判定的纹理`);
                    return;
                }
                
                note.touchAnimation = new PIXI.AnimatedSprite(touchTextures);
                note.touchAnimation.animationSpeed = 1.0; // 正常速度播放
                note.touchAnimation.loop = false;
                note.touchAnimation.visible = false;
                note.touchAnimation.gotoAndStop(0);
                
                // 添加动画完成事件监听
                note.touchAnimation.onComplete = () => {
                    // 动画播放完成后，短暂停留在最后一帧后立即隐藏
                    setTimeout(() => {
                        note.touchAnimation.visible = false;
                        note.touchAnimation.stop();
                        note.isTouching = false;
                    }, 50); // 最后一帧只停留50ms
                };
                
                // 将判定动画添加到gridContainer，并放在button下层
                gridContainer.addChild(note.touchAnimation);
                
                // 找到对应的button，将判定动画放在button下面
                const buttonIndex = note.row * gridSize + note.col;
                const button = playButtons[buttonIndex];
                if (button && button.parent === gridContainer) {
                    const buttonChildIndex = gridContainer.getChildIndex(button);
                    // 将判定动画放在button的前面（下层）
                    gridContainer.setChildIndex(note.touchAnimation, buttonChildIndex - 1);
                }
            }
            
            // 设置位置和大小（占满整个格子）
            note.touchAnimation.x = note.col * cellSize;
            note.touchAnimation.y = note.row * cellSize;
            note.touchAnimation.width = cellSize;
            note.touchAnimation.height = cellSize;
            

            
            // 重置并播放判定动画
            note.touchAnimation.gotoAndStop(0);
            note.touchAnimation.visible = true;
            note.touchAnimation.play();
            note.isTouching = true;
        }
        
        // 根据当前音频时间更新所有note的帧
        function updateNotes(currentTimeMs) {
            notes.forEach((note, index) => {
                // 查找该格子的所有note
                const cellNotes = chartData.filter(n => n.cellIndex === index);
                
                if (cellNotes.length > 0) {
                    let shouldShow = false;
                    let frameIndex = 0;
                    
                    // 按照30fps计算，每帧约33.33ms
                    const frameDuration = 1000 / 30; // 约33.33ms每帧
                    const preDisplayFrames = 16; // 提前16帧开始显示
                    const preDisplayTime = preDisplayFrames * frameDuration; // 约533ms
                    const totalAnimFrames = 25; // 总共25帧
                    const postDisplayFrames = totalAnimFrames - preDisplayFrames; // 后续9帧
                    const postDisplayTime = postDisplayFrames * frameDuration; // 约300ms
                    
                    // 遍历该格子的所有note，找到当前应该显示的帧
                    for (const noteData of cellNotes) {
                        // 应用判定延迟：调整note的实际判定时间
                        const adjustedNoteTime = noteData.time + judgmentDelay;
                        const timeDiff = currentTimeMs - adjustedNoteTime;
                        const noteKey = `${noteData.cellIndex}_${noteData.time}`;
                        
                        // 检查是否已经错过（超过显示范围且未被判定）
                        if (timeDiff >= postDisplayTime && !judgedNotes.has(noteKey)) {
                            // Miss：note已经超过显示范围但未被判定
                            judgedNotes.add(noteKey);
                            stats.miss++;
                            combo = 0; // Miss打断combo
                            
                            // 隐藏base动画
                            note.animation.visible = false;
                            
                            // 添加Miss标记到进度条
                            addJudgmentMark('miss', noteData.time);
                            
                            updateStatsDisplay();
                            updateComboDisplay();
                            
                            // 播放clap音效（带10ms冷却限制）
                            playClapSound();
                            
                            console.log(`Miss! Cell ${index + 1}, Time: ${noteData.time}ms`);
                            continue;
                        }
                        
                        // 自动播放模式：在note时间点ms触发
                        if (autoPlayMode && !judgedNotes.has(noteKey) && timeDiff >= 0 && timeDiff < frameDuration) {
                            handleTouch(index);
                            break; // 触发后跳出循环
                        }

                        
                        // 如果在预显示范围内（前267ms）
                        if (timeDiff >= -preDisplayTime && timeDiff < 0) {
                            shouldShow = true;
                            // 计算帧索引：从0到15
                            frameIndex = Math.floor((preDisplayTime + timeDiff) / frameDuration);
                            frameIndex = Math.max(0, Math.min(preDisplayFrames - 1, frameIndex));
                            break;
                        }
                        // 如果在命中点或后续显示范围内（0到150ms）
                        else if (timeDiff >= 0 && timeDiff < postDisplayTime) {
                            shouldShow = true;
                            // 计算帧索引：从16到24
                            frameIndex = Math.floor(timeDiff / frameDuration) + preDisplayFrames;
                            frameIndex = Math.max(preDisplayFrames, Math.min(totalAnimFrames - 1, frameIndex));
                            break;
                        }
                    }
                    
                    if (shouldShow && frameIndex >= 0 && frameIndex < totalAnimFrames) {
                        // 如果note正在播放判定动画，不显示base动画
                        if (!note.isTouching) {
                            note.animation.visible = true;
                            note.animation.gotoAndStop(frameIndex);
                        }
                    } else {
                        note.animation.visible = false;
                    }
                } else {
                    // 该格子没有任何note
                    note.animation.visible = false;
                }
            });
        }

        // 初始化Web Audio API
        function initAudio() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            loadAudio();
        }
        
        // 加载音频文件
        async function loadAudio() {
            try {
                const response = await fetch(songPath);
                const arrayBuffer = await response.arrayBuffer();
                audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                console.log('音频加载成功');
                
                // 加载clap音效
                await loadClapSound();
            } catch (error) {
                console.error('音频加载失败:', error);
            }
        }
        
        // 加载clap音效
        async function loadClapSound() {
            try {
                const response = await fetch('./clap.wav');
                const arrayBuffer = await response.arrayBuffer();
                clapBuffer = await audioContext.decodeAudioData(arrayBuffer);
                console.log('Clap音效加载成功');
            } catch (error) {
                console.warn('Clap音效加载失败，将不播放判定音效:', error);
            }
        }
        
        // 播放clap音效（带冷却时间限制，仅自动播放模式）
        function playClapSound() {
            // 只在自动播放模式下播放音效
            if (!autoPlayMode) {
                return;
            }
            
            if (!clapBuffer || !audioContext) return;
            
            const currentTime = Date.now();
            // 检查是否在冷却时间内
            if (currentTime - lastClapTime < CLAP_COOLDOWN) {
                return; // 跳过本次播放
            }
            
            // 更新上次播放时间
            lastClapTime = currentTime;
            
            // 创建并播放音源
            const clapSource = audioContext.createBufferSource();
            clapSource.buffer = clapBuffer;
            clapSource.connect(audioContext.destination);
            clapSource.start(0);
        }
        
        // 统一音频管理：停止并销毁当前音源
        function stopAndDestroyAudioSource() {
            if (audioSource) {
                try {
                    // 移除onended回调，防止触发旧的状态更新
                    audioSource.onended = null;
                    audioSource.stop();
                    audioSource.disconnect();
                } catch (e) {
                    console.log('停止音源错误:', e);
                }
                audioSource = null;
            }
            isPlaying = false;
        }
        
        // 播放音频
        function playAudio() {
            if (!audioBuffer) {
                console.log('音频未加载');
                return;
            }
            
            // 如果正在播放，则暂停（保存当前时间）
            if (isPlaying && audioSource) {
                pauseTime = audioContext.currentTime - startTime;
                stopAndDestroyAudioSource();
                updatePlayButton();
                console.log('音频已暂停，时间:', pauseTime);
                return;
            }
            
            // 如果未播放，则从pauseTime位置开始播放
            // 短暂延迟确保旧音源完全停止后再创建新音源
            // 这样可以防止快速连续点击时出现多个音源同时播放
            setTimeout(() => {
                // 再次检查是否已经有音源在播放（防止重复调用）
                if (audioSource && isPlaying) {
                    console.log('已有音源在播放，跳过本次播放请求');
                    return;
                }
                
                // 检查是否是从头开始播放（pauseTime为0）
                const isFreshStart = pauseTime === 0;
                
                // 创建新的音源
                audioSource = audioContext.createBufferSource();
                audioSource.buffer = audioBuffer;
                audioSource.connect(audioContext.destination);
                
                // 从暂停位置开始播放
                const offset = pauseTime % audioBuffer.duration;
                audioSource.start(0, offset);
                // 关键修复：startTime应该基于当前audioContext时间减去偏移量
                // 这样getCurrentTime()才能返回正确的播放时间
                startTime = audioContext.currentTime - offset;
                
                // 确保进度条始终显示
                domProgressContainer.style.display = 'flex';
                
                // 只有从头开始播放时才重置统计和清除标记
                if (isFreshStart) {
                    // 重置统计
                    resetStats();
                    
                    // 清除所有判定标记
                    clearJudgmentMarks();
                }
                
                // 创建Combo文本
                createComboText();
                
                audioSource.onended = () => {
                    if (isPlaying) {
                        isPlaying = false;
                        pauseTime = 0;
                        audioSource = null;
                        updatePlayButton();
                        // 重置进度条到开头，但不隐藏
                        progressBarFill.style.width = '0%';
                        progressBarFill.style.height = '0%';
                        
                        // 显示游戏结果
                        showResult();
                    }
                };
                
                isPlaying = true;
                updatePlayButton();
            }, 10); // 10ms延迟确保旧音源完全停止
        }
        
        // 停止音频（完全停止，重置到开头）
        function stopAudio() {
            stopAndDestroyAudioSource();
            pauseTime = 0;
            updatePlayButton();
        }
        
        // 获取当前播放时间
        function getCurrentTime() {
            if (isPlaying && audioContext) {
                return audioContext.currentTime - startTime;
            }
            return pauseTime;
        }
        
        // 更新播放按钮状态
        function updatePlayButton() {
            const button = document.getElementById('playButton');
            if (button) {
                button.textContent = isPlaying ? '⏸️' : '▶️';
            }
        }
        
        // 重玩功能
        function replay() {
            // 直接刷新页面
            window.location.reload();
        }
        
        // 绑定播放按钮事件
        document.addEventListener('DOMContentLoaded', () => {

        // 初始化设置面板
        function initSettingsPanel() {

            const settingsPanel = document.getElementById('settingsPanel');

                markerSelect.value = savedMarker;

            // 从localStorage加载判定延迟设置

                if (savedDelay !== null) {

                    judgmentDelayInput.value = Math.max(-50, Math.min(50, delayValue));
                    judgmentDelay = delayValue;
