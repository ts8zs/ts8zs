<body>
    <div class="container">
        <h1>JSBeat</h1>
        
        <!-- 设置按钮 -->

        <!-- 设置面板 -->

            <div class="setting-item">
                <label class="setting-label">Marker:</label>
                <select id="markerSelect" class="marker-select" style="width: 100%;">
                    <option value="thundergate">Thundergate</option>

            </div>
            
            <div class="setting-item">
                <label class="setting-label">判定延迟(ms):</label>
                <input type="number" id="judgmentDelayInput" class="control-input" value="0" min="-50" max="50" step="1" style="width: 100%;">
            </div>
        </div>
        
        <!-- 随机推荐区域 -->
        <div id="randomSection" class="random-section" style="display: none;">
            <div class="random-header">
                <div class="random-title">🎲 随机推荐</div>
                <button id="randomRefreshBtn" class="random-refresh-btn">🔄 换一批</button>
            </div>
            <div id="randomSongs" class="random-songs"></div>
        </div>
        
        <!-- 控制和排序区域（移到搜索框左边） -->
        <div class="search-box sticky" id="searchBoxContainer">
            <div style="display: flex; gap: 15px; align-items: center;">
                <div class="sort-controls">
                    <span class="control-label">排序:</span>
                    <select id="sortField" class="control-select" style="border: none; padding: 0; background: transparent;">
                        <option value="name">歌曲名称</option>
                        <option value="artist">歌手名称</option>
                        <option value="bsc">BSC难度</option>
                        <option value="adv">ADV难度</option>
                        <option value="ext">EXT难度</option>
                    </select>
                    <button id="sortOrderToggle" class="sort-order-toggle">↑ 升序</button>
                </div>
                <input type="text" id="searchInput" class="search-input" placeholder="搜索曲目名称、作曲家、难度..." style="flex: 1;">
            </div>
        </div>
        
        <div id="loading" class="loading">加载中...</div>
        
        <div id="songsContainer" class="songs-grid" style="display: none;"></div>
        
        <button id="startBtn" class="start-btn" disabled>开始游戏</button>
        
        <!-- 返回顶部按钮 -->
        <button id="backToTop" class="back-to-top" title="返回顶部">↑</button>
    </div>
    
    <script>
        let songs = [];
        let selectedSong = null;
        let selectedDifficulty = null;
        let selectedMarker = 'thundergate'; // 默认marker
        let currentSortField = 'name'; // 当前排序字段
        let currentSortOrder = 'asc'; // 当前排序顺序
        
        // 难度对应的谱面文件
        const difficultyFiles = {
            'basic': 'pt_bsc.jmt',
            'advanced': 'pt_adv.jmt',
            'extreme': 'pt_ext.jmt'
        };
        
        // 加载所有曲目
        async function loadSongs() {
            try {
                let songList = [];
                
                // 尝试从配置文件加载
                try {
                    const response = await fetch('./songs/songs.json');
                    if (response.ok) {
                        const data = await response.json();
                        if (data.songs && Array.isArray(data.songs)) {
                            songList = data.songs;
                            console.log('从配置文件加载曲目列表');
                        }
                    }
                } catch (error) {
                    console.log('无法加载配置文件，使用预定义列表');
                }
                
                // 如果配置文件加载失败，使用预定义列表
                if (songList.length === 0) {
                    songList = [
                        { id: 'Evans' },
                        { id: 'flower' }
                    ];
                    console.log('使用预定义曲目列表');
                }
                
                console.log('发现的曲目:', songList.map(s => s.id));
                
                // 加载每个曲目的详细信息
                songs = await Promise.all(songList.map(async (songInfo) => {
                    const dir = songInfo.id;
                    try {
                        // 如果配置文件中已有完整信息，直接使用
                        if (songInfo.name && songInfo.artist) {
                            return {
                                id: dir,
                                path: `./songs/${dir}`,
                                name: songInfo.name,
                                artist: songInfo.artist,
                                bpm: songInfo.bpm,
                                levels: songInfo.levels,
                                from: songInfo.from
                            };
                        }
                        
                        // 否则从 manifest.txt 读取
                        const response = await fetch(`./songs/${dir}/manifest.txt`);
                        if (!response.ok) {
                            console.warn(`${dir} 的 manifest.txt 不存在`);
                            return null;
                        }
                        
                        const text = await response.text();
                        const manifest = parseManifest(text);
                        
                        return {
                            id: dir,
                            path: `./songs/${dir}`,
                            ...manifest
                        };
                    } catch (error) {
                        console.error(`加载 ${dir} 失败:`, error);
                        return null;
                    }
                }));
                
                songs = songs.filter(s => s !== null);
                
                if (songs.length === 0) {
                    document.getElementById('loading').textContent = '未找到任何曲目，请检查songs目录';
                } else {
                    displaySongs();
                }
                
                return songs; // 返回歌曲列表
                
            } catch (error) {
                console.error('加载曲目失败:', error);
                document.getElementById('loading').textContent = '加载失败，请检查文件结构';
                return [];
            }
        }
        
        // 解析manifest文件
        function parseManifest(text) {
            const lines = text.split('\n');
            const manifest = {};
            
            for (const line of lines) {
                const trimmed = line.trim();
                if (trimmed.startsWith('Name=')) {
                    manifest.name = trimmed.substring(5);
                } else if (trimmed.startsWith('Composer=')) {
                    manifest.artist = trimmed.substring(9);
                } else if (trimmed.startsWith('BPM=')) {
                    manifest.bpm = trimmed.substring(4);
                } else if (trimmed.startsWith('Level=')) {
                    const levels = trimmed.substring(6).split(',');
                    manifest.levels = levels.map(l => parseInt(l.trim()));
                }
            }
            
            return manifest;
        }
        
        // 显示曲目列表
        function displaySongs(filterText = '') {
            const container = document.getElementById('songsContainer');
            const loading = document.getElementById('loading');
            
            container.innerHTML = '';
            
            let filteredSongs = songs.filter(song => {
                if (!filterText) return true;
                const searchLower = filterText.toLowerCase();
                
                // 搜索歌曲名称、作曲家
                const nameMatch = song.name.toLowerCase().includes(searchLower);
                const artistMatch = song.artist.toLowerCase().includes(searchLower);
                
                // 搜索难度数字（BSC, ADV, EXT）
                const levelMatch = song.levels.some(level => 
                    level != null && level.toString().includes(searchLower)
                );
                
                return nameMatch || artistMatch || levelMatch;
            });
            
            // 应用排序
            filteredSongs = sortSongs(filteredSongs);
            
            if (filteredSongs.length === 0) {
                container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: white; font-size: 1.2em; padding: 50px;">未找到匹配的曲目</div>';
            } else {
                filteredSongs.forEach((song, index) => {
                    const originalIndex = songs.indexOf(song);
                    const card = createSongCard(song, originalIndex);
                    container.appendChild(card);
                });
            }
            
            loading.style.display = 'none';
            container.style.display = 'grid';
        }
        
        // 排序函数
        function sortSongs(songList) {
            const sorted = [...songList];
            const multiplier = currentSortOrder === 'asc' ? 1 : -1;
            
            sorted.sort((a, b) => {
                let valueA, valueB;
                
                switch(currentSortField) {
                    case 'name':
                        valueA = a.name.toLowerCase();
                        valueB = b.name.toLowerCase();
                        return valueA.localeCompare(valueB) * multiplier;
                    
                    case 'artist':
                        valueA = a.artist.toLowerCase();
                        valueB = b.artist.toLowerCase();
                        return valueA.localeCompare(valueB) * multiplier;
                    
                    case 'bsc':
                        valueA = a.levels[0] || 0;
                        valueB = b.levels[0] || 0;
                        return (valueA - valueB) * multiplier;
                    
                    case 'adv':
                        valueA = a.levels[1] || 0;
                        valueB = b.levels[1] || 0;
                        return (valueA - valueB) * multiplier;
                    
                    case 'ext':
                        valueA = a.levels[2] || 0;
                        valueB = b.levels[2] || 0;
                        return (valueA - valueB) * multiplier;
                    
                    default:
                        return 0;
                }
            });
            
            return sorted;
        }
        
        // 随机推荐功能
        function showRandomSongs() {
            if (songs.length < 2) return;
            
            const randomSection = document.getElementById('randomSection');
            const randomSongsContainer = document.getElementById('randomSongs');
            
            // 先显示容器，以便获取正确的宽度
            randomSection.style.display = 'block';
            
            // 计算容器宽度能容纳多少张卡片
            const containerWidth = randomSongsContainer.offsetWidth;
            const cardWidth = 150; // 卡片宽度
            const gap = 15; // 间距
            const maxCards = Math.floor((containerWidth + gap) / (cardWidth + gap));
            
            // 随机选择不超过容器宽度的歌曲数量
            const shuffled = [...songs].sort(() => Math.random() - 0.5);
            const count = Math.min(maxCards, songs.length);
            const selected = shuffled.slice(0, count);
            
            randomSongsContainer.innerHTML = '';
            
            selected.forEach(song => {
                const card = document.createElement('div');
                card.className = 'random-song-card';
                card.dataset.songId = song.id; // 存储歌曲ID用于滚动定位
                
                // 尝试加载封面图片
                const img = new Image();
                img.className = 'random-song-image';
                img.src = `${song.path}/pic.jpg`;
                img.onerror = () => {
                    img.style.background = 'linear-gradient(45deg, #667eea, #764ba2)';
                };
                
                // 创建文字覆盖层
                const overlay = document.createElement('div');
                overlay.className = 'random-song-overlay';
                
                const titleDiv = document.createElement('div');
                titleDiv.className = 'random-song-title';
                titleDiv.textContent = song.name;
                titleDiv.title = song.name; // 鼠标悬停显示完整标题
                
                const artistDiv = document.createElement('div');
                artistDiv.className = 'random-song-artist';
                artistDiv.textContent = song.artist;
                artistDiv.title = song.artist; // 鼠标悬停显示完整歌手名
                
                overlay.appendChild(titleDiv);
                overlay.appendChild(artistDiv);
                
                card.appendChild(img);
                card.appendChild(overlay);
                
                // 点击随机卡片滚动到对应的歌曲卡片
                card.addEventListener('click', () => {
                    // 查找对应的歌曲卡片（通过songId匹配）
                    const songCards = document.querySelectorAll('.song-card');
                    for (const card of songCards) {
                        if (card.dataset.songId === song.id) {
                            // 滚动到该卡片
                            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            // 高亮显示
                            card.classList.add('selected');
                            setTimeout(() => {
                                card.classList.remove('selected');
                            }, 2000);
                            break;
                        }
                    }
                });
                
                randomSongsContainer.appendChild(card);
            });
        }
        
        // 刷新随机推荐
        function refreshRandomSongs() {
            showRandomSongs();
        }
        
        // 返回顶部功能
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        // 监听滚动事件，显示/隐藏返回顶部按钮
        function handleScroll() {
            const backToTopBtn = document.getElementById('backToTop');
            if (window.scrollY > 300) {
                backToTopBtn.classList.add('visible');
            } else {
                backToTopBtn.classList.remove('visible');
            }
        }
        
        // 搜索功能
        document.getElementById('searchInput').addEventListener('input', (e) => {
            displaySongs(e.target.value);
        });
        
        // 创建曲目卡片
        function createSongCard(song, index) {
            const card = document.createElement('div');
            card.className = 'song-card';
            card.dataset.songId = song.id; // 使用歌曲ID而非索引
            
            // 曲目图片（如果有）
            const imageDiv = document.createElement('div');
            imageDiv.className = 'song-image';
            
            // 尝试加载封面图片
            const img = new Image();
            img.src = `${song.path}/pic.jpg`;
            img.onload = () => {
                imageDiv.innerHTML = '';
                imageDiv.appendChild(img);
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.objectFit = 'cover';
                
                // 添加BPM显示
                const bpmOverlay = document.createElement('div');
                bpmOverlay.className = 'song-bpm-overlay';
                bpmOverlay.textContent = `BPM: ${song.bpm}`;
                imageDiv.appendChild(bpmOverlay);
            };
            img.onerror = () => {
                imageDiv.textContent = song.name;
                
                // 添加BPM显示
                const bpmOverlay = document.createElement('div');
                bpmOverlay.className = 'song-bpm-overlay';
                bpmOverlay.textContent = `BPM: ${song.bpm}`;
                imageDiv.appendChild(bpmOverlay);
            };
            
            // 曲目信息
            const infoDiv = document.createElement('div');
            infoDiv.className = 'song-info';
            
            const titleDiv = document.createElement('div');
            titleDiv.className = 'song-title';
            titleDiv.textContent = song.name;
            
            const artistDiv = document.createElement('div');
            artistDiv.className = 'song-artist';
            artistDiv.textContent = song.artist;
            
            const bpmDiv = document.createElement('div');
            bpmDiv.className = 'song-bpm';
            bpmDiv.textContent = `BPM: ${song.bpm}`;
            
            // 难度选择
            const diffSelector = document.createElement('div');
            diffSelector.className = 'difficulty-selector';
            
            const difficulties = [
                { key: 'basic', label: 'BSC', level: song.levels[0], color: 'basic' },
                { key: 'advanced', label: 'ADV', level: song.levels[1], color: 'advanced' },
                { key: 'extreme', label: 'EXT', level: song.levels[2], color: 'extreme' }
            ];
            
            difficulties.forEach(diff => {
                const btn = document.createElement('button');
                btn.className = `diff-btn ${diff.color}`;
                btn.textContent = `${diff.label}\nLv.${diff.level}`;
                btn.style.whiteSpace = 'pre-line';
                btn.dataset.difficulty = diff.key;
                
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    selectDifficulty(song, diff.key, btn);
                });
                
                diffSelector.appendChild(btn);
            });
            
            infoDiv.appendChild(titleDiv);
            infoDiv.appendChild(artistDiv);
            infoDiv.appendChild(bpmDiv);
            infoDiv.appendChild(diffSelector);
            
            card.appendChild(imageDiv);
            card.appendChild(infoDiv);
            
            // 点击卡片选择曲目
            card.addEventListener('click', () => {
                selectSong(song);
            });
            
            return card;
        }
        
        // 选择曲目
        function selectSong(song) {
            // 移除之前的选中状态
            document.querySelectorAll('.song-card').forEach(card => {
                card.classList.remove('selected');
            });
            
            // 设置新的选中状态（通过songId匹配）
            const cards = document.querySelectorAll('.song-card');
            cards.forEach(card => {
                if (card.dataset.songId === song.id) {
                    card.classList.add('selected');
                }
            });
            
            selectedSong = song;
            selectedDifficulty = null;
            
            // 重置难度选择
            document.querySelectorAll('.diff-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            
            updateStartButton();
        }
        
        // 选择难度
        function selectDifficulty(song, difficulty, btn) {
            if (!song) return;
            
            const chartFile = difficultyFiles[difficulty];
            const params = new URLSearchParams({
                song: song.id,
                difficulty: difficulty,
                chart: chartFile,
                marker: selectedMarker
            });
            
            // 直接跳转到游戏页面
            window.location.href = `play.html?${params.toString()}`;
        }
        
        // 更新开始按钮状态
        function updateStartButton() {
            const startBtn = document.getElementById('startBtn');
            startBtn.disabled = !(selectedSong && selectedDifficulty);
        }
        
        // 开始游戏
        document.getElementById('startBtn').addEventListener('click', () => {
            if (selectedSong && selectedDifficulty) {
                const chartFile = difficultyFiles[selectedDifficulty];
                const params = new URLSearchParams({
                    song: selectedSong.id,
                    difficulty: selectedDifficulty,
                    chart: chartFile,
                    // marker: selectedMarker
                });
                
                window.location.href = `play.html?${params.toString()}`;
            }
        });
        
        // Marker选择器事件
        document.getElementById('markerSelect').addEventListener('change', (e) => {
            selectedMarker = e.target.value;
            updateMarkerPreview();
            // 保存到localStorage
            localStorage.setItem('selectedMarker', selectedMarker);
        });
        
        // 判定延迟设置事件
        const judgmentDelayInput = document.getElementById('judgmentDelayInput');
        if (judgmentDelayInput) {
            // 从localStorage加载保存的判定延迟
            const savedDelay = localStorage.getItem('judgmentDelay');
            if (savedDelay !== null) {
                const delayValue = parseInt(savedDelay) || 0;
                // 确保值在有效范围内
                judgmentDelayInput.value = Math.max(-50, Math.min(50, delayValue));
            }
            
            // 监听变化并保存
            judgmentDelayInput.addEventListener('change', (e) => {
                let delay = parseInt(e.target.value) || 0;
                
                // 限制在 -50 到 50 之间
                delay = Math.max(-50, Math.min(50, delay));
                
                e.target.value = delay;
                localStorage.setItem('judgmentDelay', delay.toString());
                console.log(`判定延迟已保存: ${delay}ms`);
            });
        }
        
        // 排序字段改变事件
        document.getElementById('sortField').addEventListener('change', (e) => {
            currentSortField = e.target.value;
            // 保存到localStorage
            localStorage.setItem('currentSortField', currentSortField);
            // 重新显示歌曲列表
            const searchInput = document.getElementById('searchInput');
            displaySongs(searchInput.value);
        });
        
        // 排序顺序切换按钮
        const sortOrderToggle = document.getElementById('sortOrderToggle');
        if (sortOrderToggle) {
            // 初始化按钮文本
            sortOrderToggle.textContent = currentSortOrder === 'asc' ? '↑ 升序' : '↓ 降序';
            
            sortOrderToggle.addEventListener('click', () => {
                // 切换排序顺序
                currentSortOrder = currentSortOrder === 'asc' ? 'desc' : 'asc';
                // 更新按钮文本
                sortOrderToggle.textContent = currentSortOrder === 'asc' ? '↑ 升序' : '↓ 降序';
                // 保存到localStorage
                localStorage.setItem('currentSortOrder', currentSortOrder);
                // 重新显示歌曲列表
                const searchInput = document.getElementById('searchInput');
                displaySongs(searchInput.value);
            });
        }
        
        // 刷新随机推荐按钮
        document.getElementById('randomRefreshBtn').addEventListener('click', () => {
            refreshRandomSongs();
        });
        
        // 返回顶部按钮
        document.getElementById('backToTop').addEventListener('click', () => {
            scrollToTop();
        });
        
        // 设置面板切换
        const settingsToggleBtn = document.getElementById('settingsToggleBtn');
        const settingsPanel = document.getElementById('settingsPanel');
        
        if (settingsToggleBtn && settingsPanel) {
            settingsToggleBtn.addEventListener('click', () => {
                settingsPanel.classList.toggle('open');
                // 切换按钮图标
                settingsToggleBtn.textContent = settingsPanel.classList.contains('open') ? '✖️' : '⚙️';
            });
            
            // 点击面板外部关闭
            document.addEventListener('click', (e) => {
                if (!settingsPanel.contains(e.target) && !settingsToggleBtn.contains(e.target)) {
                    settingsPanel.classList.remove('open');
                    settingsToggleBtn.textContent = '⚙️';
                }
            });
        }
        
        // 监听滚动事件
        window.addEventListener('scroll', handleScroll);
        
        // 更新marker预览图
        function updateMarkerPreview() {
            const previewImg = document.getElementById('markerPreview');
            previewImg.src = `./markers/${selectedMarker}/preview.png`;
        }
        
        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', () => {
            // 从localStorage恢复上次选择的marker
            const savedMarker = localStorage.getItem('selectedMarker');
            if (savedMarker) {
                selectedMarker = savedMarker;
                document.getElementById('markerSelect').value = savedMarker;
                updateMarkerPreview();
            }
            
            // 从localStorage恢复排序设置
            const savedSortField = localStorage.getItem('currentSortField');
            if (savedSortField) {
                currentSortField = savedSortField;
                document.getElementById('sortField').value = savedSortField;
            }
            
            const savedSortOrder = localStorage.getItem('currentSortOrder');
            if (savedSortOrder) {
                currentSortOrder = savedSortOrder;
            }
            
            // 加载歌曲列表
            loadSongs().then((loadedSongs) => {
                // 歌曲加载完成后显示随机推荐
                if (loadedSongs && loadedSongs.length > 0) {
                    showRandomSongs();
                }
            });
        });
    </script>
</body>
</html>
