title: 提升8智商
description: Ts8zs - 提升8智商的代码存放处
url: "https://www.ts8zs.com"
lang: zh-CN

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"

# Files/folders listed here are NOT copied to _site by Jekyll.
# Only list things that should never appear on the live site.
# IMPORTANT: static assets used by pages (txt word lists, zip downloads, etc.)
# must NOT be here, otherwise the pages that reference them will break.
exclude:
  - README.md
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .vscode

# Default layout for the markdown blog posts moved to root.
# Individual files set their own permalink so URLs stay clean (e.g. /talent/).
defaults:
  - scope:
      path: ""        # all pages
      type: pages
    values:
      layout: "default"
